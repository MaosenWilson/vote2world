seed: 42
dataset:
  name: rt1_single_step
  split: unlabeled_adaptation
  allow_future_gt: false

sampling:
  group_size: 16
  temperature: 1.0

reward:
  type: transition_consensus_binary
  distance: cosine
  tau_dist_quantile: 0.30
  tau_vote: 0.50
  tau_group: 0.50
  static_gate:
    enabled: true
    tau_action: null
    tau_motion: null

training:
  algorithm: grpo
  max_steps: 50
  tokenizer_frozen: true
  reference_policy_frozen: true
  kl_coefficient: null

logging:
  output_dir: outputs/grpo_smoke_test
  metrics:
    - reward_positive_ratio
    - skip_rate
    - group_confidence
    - pairwise_distance_mean
    - pairwise_distance_std
    - static_gate_ratio
    - kl
    - entropy
    - grad_norm

