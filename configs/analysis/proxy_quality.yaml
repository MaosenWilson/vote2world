seed: 42
dataset:
  name: rt1_single_step
  split: adaptation_sample
  num_inputs: 1000
  allow_future_gt: true  # Analysis only. Never use this in adaptation training.

sampling:
  group_size: 16
  temperature: 1.0
  top_k: null
  top_p: null

consensus:
  feature_spaces:
    - pixel
    - image_feature
    - transition_feature
  distance: cosine
  quantile: 0.30

outputs:
  root: outputs/proxy_quality_analysis

